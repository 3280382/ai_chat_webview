<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pi AI Chat - 智能对话</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* ========================================
       CSS Variables - Design Tokens
       ======================================== */
    :root {
      /* Colors - Modern Light Theme */
      --color-primary-50: #eff6ff;
      --color-primary-100: #dbeafe;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-700: #1d4ed8;
      
      --color-neutral-50: #fafafa;
      --color-neutral-100: #f5f5f5;
      --color-neutral-200: #e5e5e5;
      --color-neutral-300: #d4d4d4;
      --color-neutral-400: #a3a3a3;
      --color-neutral-500: #737373;
      --color-neutral-600: #525252;
      --color-neutral-700: #404040;
      --color-neutral-800: #262626;
      --color-neutral-900: #171717;
      
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
      --color-info: #3b82f6;
      
      /* Semantic Colors */
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --bg-elevated: #ffffff;
      --bg-sidebar: #f8fafc;
      
      --text-primary: #171717;
      --text-secondary: #525252;
      --text-tertiary: #737373;
      --text-inverse: #ffffff;
      --text-link: #2563eb;
      
      --border-subtle: #e5e5e5;
      --border-default: #d4d4d4;
      --border-strong: #a3a3a3;
      
      /* Typography */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      
      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.625;
      
      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      
      /* Border Radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-full: 9999px;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
      
      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Layout */
      --header-height: 64px;
      --bottom-nav-height: calc(72px + env(safe-area-inset-bottom, 0px));
      --sidebar-width: 280px;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    /* Dark Theme */
    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #171717;
      --bg-tertiary: #262626;
      --bg-elevated: #1a1a1a;
      --bg-sidebar: #141414;
      
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --text-tertiary: #737373;
      --text-inverse: #171717;
      --text-link: #60a5fa;
      
      --border-subtle: #262626;
      --border-default: #404040;
      --border-strong: #525252;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
    }
    
    /* ========================================
       Base Styles
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      color: var(--text-primary);
      background: var(--bg-secondary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* ========================================
       App Container
       ======================================== */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 100vw;
    }
    
    /* ========================================
       Header
       ======================================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-4);
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .menu-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
    
    .menu-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--text-primary);
      text-decoration: none;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
      position: relative;
    }
    
    .header-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .header-btn .badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: var(--color-error);
      border-radius: 50%;
      border: 2px solid var(--bg-primary);
    }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      margin-left: var(--space-2);
    }
    
    /* ========================================
       Main Content
       ======================================== */
    .main {
      flex: 1;
      display: flex;
      margin-top: var(--header-height);
      margin-bottom: var(--bottom-nav-height);
      overflow: hidden;
    }
    
    /* ========================================
       Sidebar
       ======================================== */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }
    
    @media (min-width: 1024px) {
      .sidebar {
        display: flex;
      }
    }
    
    .sidebar-header {
      padding: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .new-chat-btn {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--color-primary-600);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: all var(--transition-fast);
    }
    
    .new-chat-btn:hover {
      background: var(--color-primary-700);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    .sidebar-section {
      padding: var(--space-2);
    }
    
    .sidebar-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--space-3) var(--space-4);
    }
    
    .chat-history-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
      margin: var(--space-1) var(--space-2);
    }
    
    .chat-history-item:hover {
      background: var(--bg-tertiary);
    }
    
    .chat-history-item.active {
      background: var(--color-primary-50);
      color: var(--color-primary-700);
    }
    
    .chat-history-item i {
      font-size: 18px;
      color: var(--text-tertiary);
    }
    
    .chat-history-item.active i {
      color: var(--color-primary-600);
    }
    
    .chat-history-text {
      flex: 1;
      font-size: var(--text-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* ========================================
       Chat Area
       ======================================== */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      height: 100%;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-4);
      scroll-behavior: smooth;
    }
    
    .chat-messages::after {
      content: '';
      display: block;
      height: 20px;
    }
    
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: var(--space-8);
      padding-bottom: calc(var(--space-8) + 100px);
    }
    
    .welcome-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      border-radius: var(--radius-2xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .welcome-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: var(--space-3);
      background: linear-gradient(135deg, var(--text-primary), var(--color-primary-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .welcome-subtitle {
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      max-width: 400px;
    }
    
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
      max-width: 600px;
    }
    
    .suggestion-chip {
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .suggestion-chip:hover {
      border-color: var(--color-primary-500);
      color: var(--color-primary-600);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .suggestion-chip i {
      font-size: 18px;
    }
    
    /* Message Styles */
    .message {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .message.user .message-avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    .message.ai .message-avatar {
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      color: white;
    }
    
    .message-content {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    
    .message-bubble {
      padding: var(--space-4);
      border-radius: var(--radius-xl);
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
    }
    
    .message.user .message-bubble {
      background: var(--color-primary-600);
      color: white;
      border-bottom-right-radius: var(--radius-sm);
    }
    
    .message.ai .message-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: var(--radius-sm);
    }
    
    .message-time {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin: 0 var(--space-2);
    }
    
    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
    }
    
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    
    /* File Attachment */
    .file-attachment {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      margin-top: var(--space-2);
    }
    
    .file-icon {
      width: 40px;
      height: 40px;
      background: var(--color-primary-100);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary-600);
      font-size: 20px;
    }
    
    .file-info {
      flex: 1;
    }
    
    .file-name {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .file-size {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
    
    .file-remove {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
    
    .file-remove:hover {
      background: var(--color-error);
      color: white;
    }
    
    /* ========================================
       Input Area
       ======================================== */
    .input-container {
      padding: var(--space-4);
      padding-bottom: calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
      position: relative;
      z-index: 10;
    }
    
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: var(--space-3);
      padding: var(--space-2);
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      transition: all var(--transition-fast);
    }
    
    .input-wrapper:focus-within {
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }
    
    .input-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
    }
    
    .input-action-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
    }
    
    .input-action-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .input-action-btn.active {
      color: var(--color-primary-600);
      background: var(--color-primary-100);
    }
    
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: var(--text-base);
      color: var(--text-primary);
      resize: none;
      max-height: 150px;
      min-height: 24px;
      padding: var(--space-2) 0;
      outline: none;
    }
    
    .chat-input::placeholder {
      color: var(--text-tertiary);
    }
    
    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--color-primary-600);
      color: white;
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    
    .send-btn:hover:not(:disabled) {
      background: var(--color-primary-700);
      transform: scale(1.05);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .input-hint {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: var(--space-2);
    }
    
    /* ========================================
       Bottom Navigation
       ======================================== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bottom-nav-height);
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 var(--space-4);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-radius: var(--radius-lg);
    }
    
    .nav-item:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }
    
    .nav-item.active {
      color: var(--color-primary-600);
    }
    
    .nav-item i {
      font-size: 24px;
    }
    
    .nav-item span {
      font-size: var(--text-xs);
      font-weight: 500;
    }
    
    .nav-item.center-btn {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      color: white;
      border-radius: var(--radius-full);
      margin-top: -20px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    
    .nav-item.center-btn i {
      font-size: 28px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .nav-item.center-btn:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    
    /* ========================================
       Mobile Menu Overlay
       ======================================== */
    .mobile-menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-normal);
    }
    
    .mobile-menu-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--bg-primary);
      z-index: 101;
      transform: translateX(-100%);
      transition: transform var(--transition-normal);
      overflow-y: auto;
    }
    
    .mobile-menu.active {
      transform: translateX(0);
    }
    
    /* ========================================
       Scrollbar Styles
       ======================================== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: var(--radius-full);
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }
    
    /* ========================================
       Utility Classes
       ======================================== */
    .hidden { display: none !important; }
    
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->

    <!-- Main Content -->
    <main class="main">
      <!-- Sidebar (Desktop) -->
      <aside class="sidebar">

          <button class="new-chat-btn" onclick="newChat()">
            <i class="ph ph-pencil-simple"></i>

        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">今天</div>
          <div class="chat-history-item active" onclick="selectChat(this)">
            <i class="ph ph-chat-circle"></i>
            <span class="chat-history-text">前端开发最佳实践</span>
          </div>
          <div class="chat-history-item" onclick="selectChat(this)">
            <i class="ph ph-chat-circle"></i>
            <span class="chat-history-text">React Hooks 使用指南</span>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">昨天</div>
          <div class="chat-history-item" onclick="selectChat(this)">
            <i class="ph ph-chat-circle"></i>
            <span class="chat-history-text">CSS Grid 布局教程</span>
          </div>
          <div class="chat-history-item" onclick="selectChat(this)">
            <i class="ph ph-chat-circle"></i>
            <span class="chat-history-text">JavaScript 异步编程</span>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">更早</div>

          <!-- Welcome Screen -->
          <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-logo">
              <i class="ph ph-sparkle"></i>
            </div>
            <h1 class="welcome-title">你好！我是 Pi AI</h1>
            <p class="welcome-subtitle">
              我可以帮你解答问题、创作内容、编写代码、分析数据，或者只是聊聊天。
            </p>
            <div class="suggestion-chips">
              <button class="suggestion-chip" onclick="sendSuggestion('帮我写一个React组件')">
                <i class="ph ph-code"></i>
                写代码
              </button>
              <button class="suggestion-chip" onclick="sendSuggestion('解释什么是机器学习')">
                <i class="ph ph-brain"></i>

              <button class="suggestion-chip" onclick="sendSuggestion('帮我写一封邮件')">
                <i class="ph ph-envelope"></i>

              </button>

                <i class="ph ph-books"></i>
                推荐书籍
              </button>

          <!-- Messages will be inserted here -->
        </div>
        
        <!-- Input Area -->
        <div class="input-container">
          <div id="filePreview" class="hidden">
            <!-- File attachment will be shown here -->
          </div>
          <div class="input-wrapper">
            <div class="input-actions">
              <button class="input-action-btn" onclick="selectFile()" id="fileBtn">
                <i class="ph ph-paperclip"></i>
              </button>
              <button class="input-action-btn" onclick="toggleVoice()" id="voiceBtn">
                <i class="ph ph-microphone"></i>
              </button>

            <textarea 
              class="chat-input" 
              id="chatInput"
              placeholder="输入你的问题..."
              rows="1"
              onkeydown="handleKeyDown(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
              <i class="ph ph-paper-plane-right"></i>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="setActiveNav(this)">
        <i class="ph ph-chat-circle-text"></i>
        <span>对话</span>
      </button>
      <button class="nav-item" onclick="setActiveNav(this)">
        <i class="ph ph-compass"></i>
        <span>发现</span>
      </button>
      <button class="nav-item center-btn" onclick="newChat()" title="新对话">
        <i class="ph ph-pencil-simple"></i>
      </button>
      <button class="nav-item" onclick="setActiveNav(this)">
        <i class="ph ph-clock-counter-clockwise"></i>
        <span>历史</span>

        <i class="ph ph-user"></i>
        <span>我的</span>
      </button>

  </div>
  
  <!-- Hidden File Input -->
  <input type="file" id="fileInput" style="display: none" onchange="handleFileSelect(event)">

  <script>
    // State
    let isTyping = false;
    let currentFile = null;
    
    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      icon.className = newTheme === 'dark' ? 'ph ph-sun' : 'ph ph-moon';
      localStorage.setItem('theme', newTheme);
    }
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'ph ph-sun' : 'ph ph-moon';
    }
    
    // Mobile Menu Toggle
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const overlay = document.getElementById('mobileOverlay');
      menu.classList.toggle('active');
      overlay.classList.toggle('active');
    }
    
    // Navigation Active State
    function setActiveNav(element) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      element.classList.add('active');
    }
    
    // Select Chat
    function selectChat(element) {
      document.querySelectorAll('.chat-history-item').forEach(item => {
        item.classList.remove('active');
      });
      element.classList.add('active');
    }
    
    // New Chat
    function newChat() {
      const chatMessages = document.getElementById('chatMessages');
      const welcomeScreen = document.getElementById('welcomeScreen');
      
      // Remove all messages except welcome screen
      const messages = chatMessages.querySelectorAll('.message, .typing-indicator');
      messages.forEach(msg => msg.remove());
      
      // Show welcome screen
      welcomeScreen.classList.remove('hidden');
      
      // Clear input
      document.getElementById('chatInput').value = '';
      document.getElementById('filePreview').innerHTML = '';
      document.getElementById('filePreview').classList.add('hidden');
      currentFile = null;
    }
    
    // Auto-resize textarea
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }
    
    // Handle Key Down
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    // Send Suggestion
    function sendSuggestion(text) {
      document.getElementById('chatInput').value = text;
      sendMessage();
    }
    
    // Send Message
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message && !currentFile) return;
      
      // Hide welcome screen
      document.getElementById('welcomeScreen').classList.add('hidden');
      
      // Add user message
      addMessage('user', message);
      
      // Clear input
      input.value = '';
      input.style.height = 'auto';
      
      // Clear file
      if (currentFile) {
        currentFile = null;
        document.getElementById('filePreview').innerHTML = '';
        document.getElementById('filePreview').classList.add('hidden');
      }
      
      // Show typing indicator
      showTypingIndicator();
      
      // Simulate AI response
      setTimeout(() => {
        removeTypingIndicator();
        const response = generateAIResponse(message);
        addMessage('ai', response);
      }, 1500 + Math.random() * 1000);
    }
    
    // Add Message
    function addMessage(sender, text) {
      const chatMessages = document.getElementById('chatMessages');
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const avatar = sender === 'user' ? 
        '<div class="message-avatar">U</div>' : 
        '<div class="message-avatar"><i class="ph ph-sparkle"></i></div>';
      
      let content = `<div class="message-bubble">${formatText(text)}</div>`;
      
      // Add file attachment if exists
      if (currentFile && sender === 'user') {
        content += `
          <div class="file-attachment">
            <div class="file-icon">
              <i class="ph ph-file"></i>
            </div>
            <div class="file-info">
              <div class="file-name">${currentFile.name}</div>
              <div class="file-size">${formatFileSize(currentFile.size)}</div>
            </div>
          </div>
        `;
      }
      
      content += `<span class="message-time">${time}</span>`;
      
      messageDiv.innerHTML = `
        ${avatar}
        <div class="message-content">
          ${content}
        </div>
      `;
      
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Format Text (simple markdown-like)
    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.9em;">$1</code>')
        .replace(/\n/g, '<br>');
    }
    
    // Show Typing Indicator
    function showTypingIndicator() {
      const chatMessages = document.getElementById('chatMessages');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="message-avatar"><i class="ph ph-sparkle"></i></div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Remove Typing Indicator
    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }
    
    // Generate AI Response
    function generateAIResponse(userMessage) {
      const responses = [
        "这是一个很好的问题！让我为你详细解释一下...",
        "我理解你的需求。基于我的经验，我建议你可以这样处理：",
        "好的，我来帮你分析一下这个问题。首先，我们需要考虑...",
        "没问题！这是你要的内容：",
        "有趣的想法！我觉得可以从以下几个角度来思考...",
        "收到！让我为你生成一个示例：\n\n```javascript\nfunction example() {\n  console.log('Hello World');\n}\n```",
      ];
      
      // Context-aware responses
      if (userMessage.includes('代码') || userMessage.includes('编程')) {
        return "当然！这是一个示例代码：\n\n```javascript\n// 示例函数\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\n\nconsole.log(greet('World'));\n```\n\n有什么需要我解释的吗？";
      }
      
      if (userMessage.includes('你好') || userMessage.includes('嗨')) {
        return "你好！很高兴见到你。有什么我可以帮助你的吗？😊";
      }
      
      return responses[Math.floor(Math.random() * responses.length)];
    }
    
    // Select File
    function selectFile() {
      document.getElementById('fileInput').click();
    }
    
    // Handle File Select
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      currentFile = file;
      showFilePreview(file);
    }
    
    // Show File Preview
    function showFilePreview(file) {
      const preview = document.getElementById('filePreview');
      preview.innerHTML = `
        <div class="file-attachment">
          <div class="file-icon">
            <i class="ph ph-file"></i>
          </div>
          <div class="file-info">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatFileSize(file.size)}</div>
          </div>
          <button class="file-remove" onclick="removeFile()">
            <i class="ph ph-x"></i>
          </button>
        </div>
      `;
      preview.classList.remove('hidden');
    }
    
    // Remove File
    function removeFile() {
      currentFile = null;
      document.getElementById('filePreview').innerHTML = '';
      document.getElementById('filePreview').classList.add('hidden');
      document.getElementById('fileInput').value = '';
    }
    
    // Format File Size
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    // Toggle Voice
    function toggleVoice() {
      const btn = document.getElementById('voiceBtn');
      btn.classList.toggle('active');
      
      if (btn.classList.contains('active')) {
        // Start voice recording
        btn.innerHTML = '<i class="ph ph-stop-circle"></i>';
        btn.style.color = 'var(--color-error)';
      } else {
        // Stop voice recording
        btn.innerHTML = '<i class="ph ph-microphone"></i>';
        btn.style.color = '';
      }
    }
  </script>
