<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pi AI Chat - 智能对话</title>
  <style>
    /* 系统字体栈 */
    @font-face {
      font-family: 'Inter';
      src: local('Inter'), local('SF Pro Display'), local('Segoe UI'), local('Roboto');
      font-weight: 300 700;
      font-display: swap;
    }
    
    @font-face {
      font-family: 'JetBrains Mono';
      src: local('JetBrains Mono'), local('Fira Code'), local('Consolas'), local('Monaco');
      font-weight: 400 500;
      font-display: swap;
    }
    
    /* CSS Variables */
    :root {
      --color-primary-50: #eff6ff;
      --color-primary-100: #dbeafe;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-700: #1d4ed8;
      
      --color-neutral-50: #fafafa;
      --color-neutral-100: #f5f5f5;
      --color-neutral-200: #e5e5e5;
      --color-neutral-300: #d4d4d4;
      --color-neutral-400: #a3a3a3;
      --color-neutral-500: #737373;
      --color-neutral-600: #525252;
      --color-neutral-700: #404040;
      --color-neutral-800: #262626;
      --color-neutral-900: #171717;
      
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --bg-elevated: #ffffff;
      --bg-sidebar: #f8fafc;
      
      --text-primary: #171717;
      --text-secondary: #525252;
      --text-tertiary: #737373;
      --text-inverse: #ffffff;
      --text-link: #2563eb;
      
      --border-subtle: #e5e5e5;
      --border-default: #d4d4d4;
      --border-strong: #a3a3a3;
      
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, Monaco, monospace;
      
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-full: 9999px;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
      
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      
      --header-height: 64px;
      --bottom-nav-height: calc(72px + env(safe-area-inset-bottom, 0px));
      --sidebar-width: 280px;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #171717;
      --bg-tertiary: #262626;
      --bg-elevated: #1a1a1a;
      --bg-sidebar: #141414;
      
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --text-tertiary: #737373;
      --text-inverse: #171717;
      --text-link: #60a5fa;
      
      --border-subtle: #262626;
      --border-default: #404040;
      --border-strong: #525252;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
    }
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-secondary);
      min-height: 100vh;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    
    /* App Container */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-4);
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 100;
      flex-shrink: 0;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .menu-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
    }
    
    .menu-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--text-primary);
      text-decoration: none;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
    }
    
    .header-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      margin-left: var(--space-2);
    }
    
    /* Main Content - 键盘适配关键 */
    .main {
      flex: 1;
      display: flex;
      margin-top: var(--header-height);
      margin-bottom: var(--bottom-nav-height);
      overflow: hidden;
      position: relative;
      height: calc(100vh - var(--header-height) - var(--bottom-nav-height));
      height: calc(100dvh - var(--header-height) - var(--bottom-nav-height));
    }
    
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }
    
    @media (min-width: 1024px) {
      .sidebar {
        display: flex;
      }
    }
    
    .sidebar-header {
      padding: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .new-chat-btn {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--color-primary-600);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: all var(--transition-fast);
    }
    
    .new-chat-btn:hover {
      background: var(--color-primary-700);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    /* Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      height: 100%;
      overflow: hidden;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: var(--space-4);
      padding-bottom: calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      padding: var(--space-8);
    }
    
    .welcome-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      border-radius: var(--radius-2xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-glow);
    }
    
    .welcome-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: var(--space-3);
      color: var(--text-primary);
    }
    
    .welcome-subtitle {
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      max-width: 400px;
      line-height: 1.6;
    }
    
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
      max-width: 600px;
    }
    
    .suggestion-chip {
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .suggestion-chip:hover {
      border-color: var(--color-primary-500);
      color: var(--color-primary-600);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    /* Message Styles */
    .message {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    
    .message.user .message-avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    .message.ai .message-avatar {
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      color: white;
    }
    
    .message-content {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    
    .message-bubble {
      padding: var(--space-4);
      border-radius: var(--radius-xl);
      font-size: var(--text-base);
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    
    .message.user .message-bubble {
      background: var(--color-primary-600);
      color: white;
      border-bottom-right-radius: var(--radius-sm);
    }
    
    .message.ai .message-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: var(--radius-sm);
    }
    
    .message-time {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin: 0 var(--space-2);
    }
    
    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
    }
    
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    
    /* Input Area - 固定在底部，键盘适配 */
    .input-container {
      position: fixed;
      bottom: var(--bottom-nav-height);
      left: 0;
      right: 0;
      padding: var(--space-4);
      padding-bottom: calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
      z-index: 50;
      transition: bottom 0.3s ease;
    }
    
    /* 当键盘弹出时，输入框上移 */
    @supports (height: 100dvh) {
      .input-container {
        position: sticky;
        bottom: 0;
      }
    }
    
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: var(--space-3);
      padding: var(--space-2);
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      transition: all var(--transition-fast);
    }
    
    .input-wrapper:focus-within {
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }
    
    .input-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
    }
    
    .input-action-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
    }
    
    .input-action-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: var(--text-base);
      color: var(--text-primary);
      resize: none;
      max-height: 150px;
      min-height: 24px;
      padding: var(--space-2) 0;
      outline: none;
    }
    
    .chat-input::placeholder {
      color: var(--text-tertiary);
    }
    
    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--color-primary-600);
      color: white;
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    
    .send-btn:hover:not(:disabled) {
      background: var(--color-primary-700);
      transform: scale(1.05);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .input-hint {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: var(--space-2);
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bottom-nav-height);
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 var(--space-4);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-radius: var(--radius-lg);
      font-size: 12px;
    }
    
    .nav-item:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }
    
    .nav-item.active {
      color: var(--color-primary-600);
    }
    
    .nav-item span {
      font-size: var(--text-xs);
      font-weight: 500;
    }
    
    .nav-item.center-btn {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
      color: white;
      border-radius: var(--radius-full);
      margin-top: -20px;
      box-shadow: var(--shadow-md);
      font-size: 24px;
    }
    
    .nav-item.center-btn:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: var(--radius-full);
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo">
          <div class="logo-icon">✨</div>
          <span>Pi AI</span>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <button class="header-btn">⚙️</button>
        <div class="user-avatar">U</div>
      </div>
    </header>
    
    <!-- Main Content -->
    <main class="main">
      <!-- Chat Container -->
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-logo">✨</div>
            <h1 class="welcome-title">你好！我是 Pi AI</h1>
            <p class="welcome-subtitle">
              我可以帮你解答问题、创作内容、编写代码、分析数据，或者只是聊聊天。
            </p>
            <div class="suggestion-chips">
              <button class="suggestion-chip" onclick="sendSuggestion('帮我写一个React组件')">💻 写代码</button>
              <button class="suggestion-chip" onclick="sendSuggestion('解释什么是机器学习')">🧠 解释概念</button>
              <button class="suggestion-chip" onclick="sendSuggestion('帮我写一封邮件')">✉️ 写邮件</button>
              <button class="suggestion-chip" onclick="sendSuggestion('推荐几本好书')">📚 推荐书籍</button>
            </div>
          </div>
        </div>
        
        <!-- Input Area -->
        <div class="input-container">
          <div class="input-wrapper">
            <div class="input-actions">
              <button class="input-action-btn" onclick="attachFile()">📎</button>
            </div>
            <textarea 
              class="chat-input" 
              id="chatInput"
              placeholder="输入你的问题..."
              rows="1"
              onkeydown="handleKeyDown(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
          </div>
          <p class="input-hint">按 Enter 发送，Shift + Enter 换行</p>
        </div>
      </div>
    </main>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab(this, 'chat')">
        <span>💬</span>
        <span>对话</span>
      </button>
      <button class="nav-item" onclick="switchTab(this, 'discover')">
        <span>🔍</span>
        <span>发现</span>
      </button>
      <button class="nav-item center-btn" onclick="newChat()" title="新对话">✏️</button>
      <button class="nav-item" onclick="switchTab(this, 'history')">
        <span>🕐</span>
        <span>历史</span>
      </button>
      <button class="nav-item" onclick="switchTab(this, 'profile')">
        <span>👤</span>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <script>
    // State
    let isTyping = false;
    let currentTheme = 'dark';
    
    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', currentTheme);
      btn.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', currentTheme);
    }
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      currentTheme = savedTheme;
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
    }
    
    // Auto-resize textarea
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }
    
    // Handle Key Down
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    // Send Suggestion
    function sendSuggestion(text) {
      document.getElementById('chatInput').value = text;
      sendMessage();
    }
    
    // Send Message
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      // Hide welcome screen
      document.getElementById('welcomeScreen').style.display = 'none';
      
      // Add user message
      addMessage('user', message, 'U');
      
      // Clear input
      input.value = '';
      input.style.height = 'auto';
      
      // Show typing indicator
      showTyping();
      document.getElementById('sendBtn').disabled = true;
      
      // Simulate AI response
      setTimeout(() => {
        hideTyping();
        const response = generateAIResponse(message);
        addMessage('ai', response, 'AI');
        document.getElementById('sendBtn').disabled = false;
      }, 1500 + Math.random() * 1000);
    }
    
    // Add Message
    function addMessage(sender, text, initial) {
      const chatMessages = document.getElementById('chatMessages');
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const bubbleContent = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-family: monospace;">$1</code>')
        .replace(/\n/g, '<br>');
      
      messageDiv.innerHTML = `
        <div class="message-avatar">${initial}</div>
        <div class="message-content">
          <div class="message-bubble">${bubbleContent}</div>
          <span class="message-time">${time}</span>
        </div>
      `;
      
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Show Typing Indicator
    function showTyping() {
      const chatMessages = document.getElementById('chatMessages');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="message-avatar">AI</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Remove Typing Indicator
    function hideTyping() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }
    
    // Generate AI Response
    function generateAIResponse(userMessage) {
      if (userMessage.includes('代码') || userMessage.includes('编程')) {
        return "当然！这是一个示例代码：\n\n```javascript\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\n\nconsole.log(greet('World'));\n```\n\n有什么需要我解释的吗？";
      }
      
      if (userMessage.includes('你好') || userMessage.includes('嗨')) {
        return "你好！很高兴见到你。有什么我可以帮助你的吗？😊";
      }
      
      const responses = [
        "这是一个很好的问题！让我为你详细解释一下...",
        "我理解你的需求。基于我的经验，我建议你可以这样处理...",
        "没问题！这是你要的内容。",
        "有趣的想法！我觉得可以从以下几个角度来思考..."
      ];
      
      return responses[Math.floor(Math.random() * responses.length)];
    }
    
    // New Chat
    function newChat() {
      const chatMessages = document.getElementById('chatMessages');
      const welcomeScreen = document.getElementById('welcomeScreen');
      
      // Remove all messages
      const messages = chatMessages.querySelectorAll('.message, .typing-indicator');
      messages.forEach(msg => msg.remove());
      
      // Show welcome screen
      welcomeScreen.style.display = 'flex';
      
      // Clear input
      document.getElementById('chatInput').value = '';
    }
    
    // Switch Tab
    function switchTab(element, tab) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      element.classList.add('active');
    }
    
    // Toggle Menu
    function toggleMenu() {
      // Menu toggle logic
      console.log('Menu toggled');
    }
    
    // Attach File
    function attachFile() {
      // File attachment logic
      console.log('Attach file');
    }
    
    // Keyboard handling for mobile
    window.addEventListener('resize', () => {
      // Scroll to bottom when keyboard opens
      const chatMessages = document.getElementById('chatMessages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
    
    // Focus input handling
    document.getElementById('chatInput').addEventListener('focus', () => {
      setTimeout(() => {
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 300);
    });
  </script>
</body>
</html>
