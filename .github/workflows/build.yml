name: Build All Platforms

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version'
        required: false
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  # Android 构建
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze || true
        continue-on-error: true
      
      - name: Build APK
        run: |
          set -x
          flutter build apk --release --build-name=${{ github.event.inputs.version || '1.0.0' }} --verbose 2>&1 | tail -100
        continue-on-error: true
      
      - name: Check build output
        run: |
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "APK not found"
          ls -la build/app/outputs/bundle/release/ 2>/dev/null || echo "AAB not found"
      
      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        if: hashFiles('build/app/outputs/flutter-apk/app-release.apk') != ''
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: Upload AAB if exists
        uses: actions/upload-artifact@v4
        if: hashFiles('build/app/outputs/bundle/release/app-release.aab') != ''
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # Web 构建（最简单，先测试这个）
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Web with verbose
        run: |
          set -x
          flutter build web --release --build-name=${{ github.event.inputs.version || '1.0.0' }} --verbose 2>&1 | tail -200
        continue-on-error: true
      
      - name: Check build output
        run: |
          ls -la build/web/ 2>/dev/null || echo "Web build not found"
      
      - name: Upload Web build
        uses: actions/upload-artifact@v4
        if: hashFiles('build/web/index.html') != ''
        with:
          name: web-build
          path: build/web/

  # iOS 构建
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: |
          set -x
          flutter build ios --release --no-codesign --build-name=${{ github.event.inputs.version || '1.0.0' }} --verbose 2>&1 | tail -100
        continue-on-error: true
      
      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        if: hashFiles('build/ios/iphoneos/Runner.app') != ''
        with:
          name: ios-build
          path: build/ios/iphoneos/

  # Windows 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release --build-name=${{ github.event.inputs.version || '1.0.0' }} --verbose 2>&1 | Select-Object -Last 100
        continue-on-error: true
      
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        if: hashFiles('build/windows/x64/runner/Release/*.exe') != ''
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  # Linux 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Linux
        run: |
          set -x
          flutter config --enable-linux-desktop
          flutter build linux --release --build-name=${{ github.event.inputs.version || '1.0.0' }} --verbose 2>&1 | tail -100
        continue-on-error: true
      
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        if: hashFiles('build/linux/x64/release/bundle/*') != ''
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  # 创建发布版本 (仅在打标签时且至少有一个构建成功)
  release:
    needs: [build-android, build-ios, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: hashFiles('artifacts/**/*') != ''
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/android-aab/*.aab
            artifacts/windows-build/**/*
            artifacts/linux-build/**/*
            artifacts/web-build/**/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
