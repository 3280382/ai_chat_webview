name: Build All Platforms

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version'
        required: false
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  # Android 构建
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Build App Bundle
        run: flutter build appbundle --release --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Check and Upload APK
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK found, size: $(ls -lh build/app/outputs/flutter-apk/app-release.apk | awk '{print $5}')"
            exit 0
          else
            echo "APK not found"
            exit 1
          fi
        continue-on-error: true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
          retention-days: 30
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

  # Web 构建
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Web
        run: flutter build web --release --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Upload Web build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-build
          path: build/web/
          if-no-files-found: warn
          retention-days: 30

  # iOS 构建
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build
          path: build/ios/iphoneos/
          if-no-files-found: warn
          retention-days: 30

  # Windows 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Build Windows
        run: flutter build windows --release --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          if-no-files-found: warn
          retention-days: 30

  # Linux 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      
      - name: Build Linux
        run: flutter build linux --release --build-name=${{ github.event.inputs.version || '1.0.0' }}
        continue-on-error: true
      
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          if-no-files-found: warn
          retention-days: 30
